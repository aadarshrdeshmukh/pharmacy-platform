# =============================================================================
# secret.yaml – Backend Sensitive Credentials
# =============================================================================
# Stores sensitive data consumed by the backend pods.
#
# ⚠️  IMPORTANT:
#   - Values below are BASE64-ENCODED PLACEHOLDERS.
#   - Replace them with your real base64-encoded secrets before deploying.
#   - Generate a base64 value:  echo -n 'my-secret' | base64
#   - For production, consider using an external secret store (e.g. Vault,
#     AWS Secrets Manager) via the External Secrets Operator.
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: pharmacy-app
  labels:
    app: pharmacy-backend
    app.kubernetes.io/part-of: pharmacy-platform
type: Opaque
data:
  # echo -n 'pharmacy_user' | base64 → cGhhcm1hY3lfdXNlcg==
  DB_USER: cGhhcm1hY3lfdXNlcg==                # TODO: replace with real base64-encoded DB username

  # echo -n 'changeme-db-password' | base64 → Y2hhbmdlbWUtZGItcGFzc3dvcmQ=
  DB_PASSWORD: Y2hhbmdlbWUtZGItcGFzc3dvcmQ=      # TODO: replace with real base64-encoded DB password

  # echo -n 'changeme-jwt-secret-key' | base64 → Y2hhbmdlbWUtand0LXNlY3JldC1rZXk=
  JWT_SECRET: Y2hhbmdlbWUtand0LXNlY3JldC1rZXk=   # TODO: replace with real base64-encoded JWT secret
