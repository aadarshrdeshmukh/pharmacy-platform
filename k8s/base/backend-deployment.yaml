# =============================================================================
# backend-deployment.yaml – Pharmacy Backend API Deployment
# =============================================================================
# Runs 2 replicas of the Node.js backend API server.
# Features:
#   - Health & readiness probes for zero-downtime deployments
#   - Resource requests/limits for predictable scheduling
#   - Prometheus scrape annotations for metrics collection
#   - Commented Vault Agent Injector annotations (enable after Vault setup)
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: pharmacy-app
  labels:
    app: pharmacy-backend
    app.kubernetes.io/name: pharmacy-backend
    app.kubernetes.io/part-of: pharmacy-platform
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pharmacy-backend
  template:
    metadata:
      labels:
        app: pharmacy-backend
        app.kubernetes.io/name: pharmacy-backend
        app.kubernetes.io/part-of: pharmacy-platform
      annotations:
        # ── Prometheus scrape configuration ──────────────────────────────────
        prometheus.io/scrape: 'true'
        prometheus.io/port: '3001'
        prometheus.io/path: '/metrics'

        # ── Vault Agent Injector annotations ─────────────────────────────────
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/role: 'pharmacy-backend'
        vault.hashicorp.com/agent-inject-secret-db-creds: 'secret/data/pharmacy-app/db'
        vault.hashicorp.com/agent-inject-template-db-creds: |
          {{- with secret "secret/data/pharmacy-app/db" -}}
          {{ .Data.data.password }}
          {{- end -}}
    spec:
      containers:
        - name: pharmacy-backend
          # TODO: replace with your actual ECR image URI
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/pharmacy-backend:latest   # TODO: replace
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              protocol: TCP

          # ── Environment variables from ConfigMap ───────────────────────────
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets

          # ── Liveness probe – restarts the pod if the app becomes unhealthy ─
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # ── Readiness probe – removes pod from Service endpoints until ready
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # ── Resource requests & limits ─────────────────────────────────────
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
