# =============================================================================
# hpa.yaml – Horizontal Pod Autoscaler for Backend
# =============================================================================
# Automatically scales the backend deployment between 2 and 5 replicas
# based on average CPU utilisation (target: 70%).
# =============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: pharmacy-app
  labels:
    app: pharmacy-backend
    app.kubernetes.io/part-of: pharmacy-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
# =============================================================================
# HPA – Horizontal Pod Autoscaler for Frontend
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pharmacy-frontend-hpa
  namespace: pharmacy-app
  labels:
    app: pharmacy-frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pharmacy-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
