# =============================================================================
# backend-service.yaml – Backend ClusterIP Service
# =============================================================================
# Exposes the backend deployment internally within the cluster on port 3001.
# Other services (frontend, ingress) route traffic here.
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: pharmacy-app
  labels:
    app: pharmacy-backend
    app.kubernetes.io/name: pharmacy-backend
    app.kubernetes.io/part-of: pharmacy-platform
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app: pharmacy-backend
  ports:
    - name: http
      protocol: TCP
      port: 3001
      targetPort: 3001
