# =============================================================================
# ingress.yaml – ALB Ingress for Pharmacy Platform
# =============================================================================
# Uses the AWS ALB Ingress Controller to create an internet-facing Application
# Load Balancer that routes traffic based on path:
#   /api* → backend-service:3001
#   /*    → frontend-service:80
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pharmacy-ingress
  namespace: pharmacy-app
  labels:
    app.kubernetes.io/part-of: pharmacy-platform
  annotations:
    # ── AWS ALB Ingress Controller annotations ──────────────────────────────
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

    # ── SSL / certificate ─────────────────────────────────────────────────
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:123456789012:certificate/xxxxx   # TODO: replace with actual ACM cert ARN
    alb.ingress.kubernetes.io/ssl-redirect: '443'

    # ── Health check configuration ─────────────────────────────────────────
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
spec:
  rules:
    - host: pharmacy.example.com    # TODO: replace with your actual domain
      http:
        paths:
          # Route API requests to the backend service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3001

          # Route everything else to the frontend service
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
