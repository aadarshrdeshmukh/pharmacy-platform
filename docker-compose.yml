services:
  mysql:
    image: mysql:8.0
    container_name: pharmacy-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pharmacy
      MYSQL_USER: pharmacy
      MYSQL_PASSWORD: pharmacy123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "pharmacy", "-ppharmacy123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pharmacy-network

  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: pharmacy-backend
    ports:
      - "3001:3001"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: pharmacy
      DB_USER: pharmacy
      DB_PASSWORD: pharmacy123
      JWT_SECRET: dev-secret-key-change-me
      NODE_ENV: development
    depends_on:
      mysql:
        condition: service_healthy
    command: >-
      sh -c "npm run migrate && npm run seed && npm start"
    networks:
      - pharmacy-network

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: pharmacy-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - pharmacy-network

networks:
  pharmacy-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
