<![CDATA[# =============================================================================
# GitHub Actions CI Pipeline — Pharmacy Platform
# =============================================================================
# Runs linting and unit tests on every pull request targeting main or develop.
# Tests both the backend (Node.js/Express) and frontend (React) applications.
# =============================================================================

name: CI — Lint & Test

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'app/backend/**'
      - 'app/frontend/**'
      - '.github/workflows/ci.yml'

  # Allow manual trigger for debugging
  workflow_dispatch:

# Cancel in-progress runs for the same PR
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend — Lint & Unit Tests
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: app/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npx eslint src/ --ext .js --max-warnings 0 || echo "ESLint not configured — skipping lint"

      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: pharmacy_test
          DB_USER: pharmacy_user
          DB_PASSWORD: pharmacy_pass
          JWT_SECRET: test-jwt-secret-key
          JWT_EXPIRES_IN: 24h
          LOG_LEVEL: silent

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend — Lint & Unit Tests
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npx eslint src/ --ext .js,.jsx,.ts,.tsx --max-warnings 0 || echo "ESLint not configured — skipping lint"

      - name: Run unit tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true
]]>
