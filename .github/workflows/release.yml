name: Release & Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  AWS_REGION: "us-east-1"
  ECR_REPO_BACKEND: "pharmacy-platform/backend"
  ECR_REPO_FRONTEND: "pharmacy-platform/frontend"
  EKS_CLUSTER_NAME: "pharmacy-platform-dev"
  EKS_NAMESPACE: "pharmacy-app"

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build Docker images and push to ECR
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag metadata
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${SHA_SHORT}"
          fi
          echo "image-tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "🏷️ Image tag: ${TAG}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          file: ./app/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_BACKEND }}:${{ steps.meta.outputs.image-tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_BACKEND }}:latest

      - name: Build & push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./app/frontend
          file: ./app/frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_FRONTEND }}:${{ steps.meta.outputs.image-tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_FRONTEND }}:latest

  # ──────────────────────────────────────────────
  # Job 2: Deploy to EKS
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Deploy Backend to EKS
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image-tag }}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"

          kubectl set image deployment/backend-deployment \
            backend="${REGISTRY}/${{ env.ECR_REPO_BACKEND }}:${IMAGE_TAG}" \
            -n ${{ env.EKS_NAMESPACE }} || echo "Backend deployment not found — first deploy requires kubectl apply"

      - name: Deploy Frontend to EKS
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image-tag }}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"

          kubectl set image deployment/frontend-deployment \
            frontend="${REGISTRY}/${{ env.ECR_REPO_FRONTEND }}:${IMAGE_TAG}" \
            -n ${{ env.EKS_NAMESPACE }} || echo "Frontend deployment not found — first deploy requires kubectl apply"

      - name: Verify deployment
        run: |
          echo "✅ Deployment complete — image tag: ${{ needs.build-and-push.outputs.image-tag }}"
          kubectl get deployments -n ${{ env.EKS_NAMESPACE }} || echo "Namespace not yet created"
          kubectl get pods -n ${{ env.EKS_NAMESPACE }} || echo "No pods yet"
